            height: 40px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.74);
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: border-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }
        .lang-flag { font-size: 0.9rem; line-height: 1; display: inline-flex; border-radius: 4px; overflow: hidden; }
        .lang-btn.active {
            color: white;
            border-color: var(--accent);
            background: rgba(0,229,255,0.08);

        .project-shell {
            width: min(1180px, calc(100% - 32px)); margin: 116px auto 40px;
            display: grid; grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr); gap: 34px; align-items: start;
        }
        .media-panel, .content-panel {
            border: 1px solid var(--border); border-radius: 32px; background: rgba(8, 9, 14, 0.72);
            overflow: hidden; box-shadow: 0 18px 42px rgba(0,0,0,0.26); contain: paint;
        }
        .media-panel { position: sticky; top: 104px; }
        .media-stage {
            position: relative; aspect-ratio: 1.08 / 1; overflow: hidden;
            background: radial-gradient(circle at top right, rgba(0,229,255,0.12), transparent 30%), linear-gradient(160deg, rgba(0,229,255,0.08), rgba(12,13,18,0.2)), #0b0d12;
        }
        .media-stage::after { content: ""; position: absolute; inset: auto 0 0 0; height: 40%; background: linear-gradient(180deg, transparent, rgba(5,5,7,0.7)); pointer-events: none; }
        .project-image { width: 100%; height: 100%; object-fit: cover; opacity: 0.86; transform: scale(1.01); transition: transform 0.7s ease, opacity 0.7s ease; }
        .media-panel:hover .project-image { transform: scale(1.03); opacity: 0.92; }
        .media-badge {
            position: absolute; left: 24px; bottom: 24px; display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); background: rgba(8,11,18,0.88);
            font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: white;
        }
        .media-badge::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 14px var(--accent); }
        .content-panel {
            padding: 38px 38px 40px;
            background:

                radial-gradient(circle at top right, rgba(0, 229, 255, 0.1), transparent 34%);
            position: relative;
        }
        .content-panel::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.55), transparent);
            pointer-events: none;

        .eyebrow {
            display: inline-flex; align-items: center; gap: 10px; margin-bottom: 18px; color: var(--accent);

        .project-title {
            margin: 0; font-family: 'Orbitron', sans-serif; font-size: clamp(2.8rem, 7vw, 5rem); line-height: 0.94;
            letter-spacing: -0.06em; text-transform: uppercase; color: white; text-shadow: 0 0 26px rgba(255,255,255,0.08);
        }
        .status-badge {
            display: inline-flex; align-items: center; gap: 10px; margin: 18px 0 20px; padding: 9px 14px; border-radius: 999px;

        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 32px 0 36px; }
        .stat-card {
            display: grid;

            align-items: center;
            gap: 14px;
            min-width: 0;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid color-mix(in srgb, var(--accent) 28%, rgba(255,255,255,0.08));

            gap: 8px;
            color: color-mix(in srgb, var(--accent) 78%, white 22%);

            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 700;
            white-space: nowrap;

            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
            flex-shrink: 0;
        }
        .stat-value {
            display: block;
            color: white;
            font-family: 'Orbitron', 'Inter', sans-serif;
            font-size: 0.82rem;
            line-height: 1.34;
            letter-spacing: 0.01em;
            font-weight: 500;
            overflow-wrap: anywhere;
        }
        .section-block + .section-block { margin-top: 34px; }
        .section-block {
            padding: 24px 24px 22px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            background:

                radial-gradient(circle at top right, rgba(0, 229, 255, 0.07), transparent 38%);

        .section-title { margin: 0 0 18px; font-size: 0.8rem; letter-spacing: 0.26em; text-transform: uppercase; color: rgba(255,255,255,0.52); font-weight: 800; }
        .feature-list { display: grid; gap: 14px; }
        .feature-item {
            display: grid; grid-template-columns: 18px minmax(0, 1fr); gap: 14px; padding: 18px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));

        }
        .feature-item:hover { transform: translateY(-2px); border-color: var(--accent-strong); background: linear-gradient(180deg, rgba(0,229,255,0.08), rgba(255,255,255,0.04)); }
        .feature-dot { width: 8px; height: 8px; margin-top: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 14px var(--accent); }
        .feature-item strong { display: block; margin-bottom: 6px; font-size: 0.96rem; color: white; }
        .feature-item span { display: block; color: var(--text-soft); font-size: 0.92rem; line-height: 1.6; }
        .timeline { display: grid; gap: 12px; }
        .timeline-row {
            display: grid;
            grid-template-columns: 118px minmax(0, 1fr);
            gap: 16px;
            padding: 16px 0;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .timeline-row:first-child { border-top: none; padding-top: 0; }
        .timeline-key { color: rgba(0, 229, 255, 0.8); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.22em; font-weight: 700; }
        .timeline-value { color: rgba(255,255,255,0.9); line-height: 1.7; }
        @media (max-width: 1080px) {
            .project-shell { grid-template-columns: 1fr; }
            .media-panel { position: relative; top: auto; }
        }
        @media (max-width: 720px) {

            #cursor { display: none; }
            .topbar {

                width: calc(100% - 16px);
                padding: 8px;
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
            }
            .topbar-group,
            .topbar-nav {
                gap: 8px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .topbar-nav {
                width: 100%;
            }
            .topbar .lang-switcher {
                position: static;
                transform: none;
                width: 100%;
                justify-content: center;
            }
            .nav-chip {
                min-height: 38px;
                padding: 0 12px;
                font-size: 0.58rem;
                letter-spacing: 0.12em;
            }
            .project-shell { width: calc(100% - 18px); margin-top: 126px; gap: 18px; }
            .content-panel { padding: 24px 18px 26px; }
            .stats-grid { grid-template-columns: 1fr; gap: 8px; }
            .stat-card { grid-template-columns: 1fr; gap: 6px; padding: 10px 11px; }
            .stat-label { font-size: 0.58rem; }
            .stat-value { font-size: 0.74rem; }
            .section-block { padding: 20px 18px 18px; }
            .timeline-row { grid-template-columns: 1fr; gap: 8px; }
        }
        body.preview-mode #cursor,
        body.preview-mode #particles { display: none !important; }
        body.preview-mode .media-panel,
        body.preview-mode .content-panel,
        body.preview-mode .section-block {
            box-shadow: none;
        }
        body.preview-mode .media-panel,
        body.preview-mode .content-panel {
            background: rgba(8, 9, 14, 0.96);
        }
        body.preview-mode .media-stage,
        body.preview-mode .content-panel,
        body.preview-mode .section-block {
            background-image: none;
        }
        body.preview-mode .media-panel:hover .project-image,
        body.preview-mode .feature-item:hover,
        body.preview-mode .nav-chip:hover {
            transform: none;
            box-shadow: none;
        }
        body.preview-mode .topbar {
            position: static;
            transform: none;
            width: calc(100% - 24px);
            margin: 12px auto 0;
        }
        body.preview-mode .project-shell {
            margin-top: 18px;
            gap: 22px;
        }
        body.preview-mode .media-panel {
            position: relative;
            top: auto;
        }
    </style>
</head>

            a: "∆", A: "∆", b: "β", B: "β", c: "Ↄ", C: "Ↄ", d: "◧", D: "◧", e: "Ξ", E: "Ξ",
            f: "Ϝ", F: "Ϝ", g: "Ǥ", G: "Ǥ", h: "Ħ", H: "Ħ", i: "ı", I: "ı", j: "ʝ", J: "ʝ",
            k: "Ҡ", K: "Ҡ", l: "⟂", L: "⟂", m: "Ɱ", M: "Ɱ", n: "Ŋ", N: "Ŋ", o: "⊘", O: "⊘",
            p: "Ҏ", P: "Ҏ", q: "Ҩ", Q: "Ҩ", r: "Ɽ", R: "Ɽ", s: "Ϟ", S: "Ϟ", t: "Ŧ", T: "Ŧ",
            u: "⋃", U: "⋃", v: "⋎", V: "⋎", w: "Ψ", W: "Ψ", x: "Ӿ", X: "Ӿ", y: "Ұ", Y: "Ұ", z: "Ȥ", Z: "Ȥ",
            0: "◌", 1: "⟊", 2: "ᒿ", 3: "Ӡ", 4: "ϟ", 5: "Ϭ", 6: "Ⳓ", 7: "⌁", 8: "∞", 9: "ϴ"
        };
        function alienizeString(value) {
            return value.split(/(<[^>]+>)/g).map((chunk) => {
                if (chunk.startsWith("<") && chunk.endsWith(">")) return chunk;
                return chunk.replace(/[A-Za-z0-9]/g, (char) => alienGlyphMap[char] || char);
            }).join("");
        }
        function alienizeDeep(value) {
            if (Array.isArray(value)) return value.map(alienizeDeep);
            if (value && typeof value === 'object') return Object.fromEntries(Object.entries(value).map(([key, item]) => [key, alienizeDeep(item)]));
            if (typeof value === 'string') return alienizeString(value);
            return value;
        }
        translations.xr = alienizeDeep(translations.en);
        let currentLang = ['hu', 'en', 'ja', 'xr'].includes(localStorage.getItem('selectedLang')) ? localStorage.getItem('selectedLang') : 'hu';
        document.documentElement.lang = currentLang;
        function renderPage() {
            const data = translations[currentLang];
            document.title = data.metaTitle;
            document.getElementById('meta-description').setAttribute('content', data.metaDescription);
            document.getElementById('meta-og-title').setAttribute('content', data.metaTitle);
            document.getElementById('meta-og-description').setAttribute('content', data.metaOgDescription);
            document.getElementById('meta-twitter-title').setAttribute('content', data.metaTitle);
            document.getElementById('meta-twitter-description').setAttribute('content', data.metaOgDescription);
            document.getElementById('btn-home').textContent = data.btnHome;
            document.getElementById('label-prev').textContent = data.prevLabel;
            document.getElementById('label-next').textContent = data.nextLabel;
            document.getElementById('eyebrow').textContent = data.eyebrow;
            document.getElementById('media-badge').textContent = data.mediaBadge;
            document.getElementById('tag-progress').textContent = data.progress;
            document.getElementById('gossipr-desc').textContent = data.desc;
            document.getElementById('features-title').textContent = data.featuresTitle;
            document.getElementById('timeline-title').textContent = data.timelineTitle;
            document.getElementById('stats-grid').innerHTML = data.stats.map(item => `<div class="stat-card"><span class="stat-label">${item.label}</span><span class="stat-value">${item.value}</span></div>`).join('');
            document.getElementById('feature-container').innerHTML = data.features.map(item => `<article class="feature-item"><div class="feature-dot"></div><div><strong>${item.title}</strong><span>${item.desc}</span></div></article>`).join('');
            document.getElementById('timeline').innerHTML = data.timeline.map(item => `<div class="timeline-row"><div class="timeline-key">${item.key}</div><div class="timeline-value">${item.value}</div></div>`).join('');
            document.getElementById('btn-hu').classList.toggle('active', currentLang === 'hu');
            document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
            document.getElementById('btn-ja').classList.toggle('active', currentLang === 'ja');
            document.getElementById('btn-xr').classList.toggle('active', currentLang === 'xr');
            document.documentElement.lang = currentLang;
        }
        const isPreview = new URLSearchParams(window.location.search).get('preview') === '1';
        if (isPreview) document.body.classList.add('preview-mode');
        renderPage();
        document.getElementById('btn-hu').addEventListener('click', () => {
            currentLang = 'hu';
            localStorage.setItem('selectedLang', 'hu');
            renderPage();
        });
        document.getElementById('btn-en').addEventListener('click', () => {
            currentLang = 'en';
            localStorage.setItem('selectedLang', 'en');
            renderPage();
        });
        document.getElementById('btn-ja').addEventListener('click', () => {
            currentLang = 'ja';
            localStorage.setItem('selectedLang', 'ja');
            renderPage();
        });
        document.getElementById('btn-xr').addEventListener('click', () => {
            currentLang = 'xr';
            localStorage.setItem('selectedLang', 'xr');
            renderPage();
        });
        if (!isPreview) {
            const cursor = document.getElementById('cursor');
            let mouseX = -100;
            let mouseY = -100;
            let hasMoved = false;
            document.addEventListener('mousemove', event => {
                mouseX = event.clientX;
                mouseY = event.clientY;
                if (!hasMoved) {
                    hasMoved = true;
                    cursor.style.opacity = '1';
                }
            });
            function renderCursor() {
                if (hasMoved && window.innerWidth > 720) {
                    cursor.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%)`;
                }
                requestAnimationFrame(renderCursor);
            }
            renderCursor();
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let particles = [];
            function initParticles() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                particles = Array.from({ length: 18 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.8 + 0.6, speedX: (Math.random() - 0.5) * 0.16, speedY: (Math.random() - 0.5) * 0.16, opacity: Math.random() }));
            }
            function drawParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(particle => {
                    particle.x += particle.speedX;
                    particle.y += particle.speedY;
                    if (particle.x > canvas.width) particle.x = 0;
                    if (particle.x < 0) particle.x = canvas.width;
                    if (particle.y > canvas.height) particle.y = 0;
                    if (particle.y < 0) particle.y = canvas.height;
                    ctx.fillStyle = `rgba(0, 229, 255, ${particle.opacity * 0.32})`;
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(drawParticles);
            }
            window.addEventListener('resize', initParticles);
            initParticles();
            drawParticles();
        }
    </script>
</body>
</html>
